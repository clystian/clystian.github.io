name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4 # Native Node 24

      - uses: pnpm/action-setup@v5 # Support for pnpm v10+ and Node 24

      - uses: actions/setup-node@v4 # Native Node 24 + Improved Auto-caching
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Verify build artifact
        run: |
          if [ ! -d dist ] || [ -z "$(find dist -type f)" ]; then
            echo "ERROR: Build artifact directory is empty or missing"
            exit 1
          fi
          echo "Build artifact verified: $(find dist -type f | wc -l) files"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4 # Latest patch is Node 24 compliant
